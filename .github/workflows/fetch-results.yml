name: Fetch WC Results

on:
  schedule:
    # Fires at kickoff+2h (normal time) and kickoff+3h (extra time/penalties)
    # for every unique WC 2026 kickoff time. Script fetches yesterday+today so
    # matches near midnight UTC are never missed. Already-scored matches are
    # skipped, so duplicate fires are harmless. Public repo = free unlimited minutes.

    - cron: '0 2 * * *'    # 00:00 kickoff +2h
    - cron: '0 3 * * *'    # 00:00 kickoff +3h
    - cron: '30 2 * * *'   # 00:30 kickoff +2h
    - cron: '30 3 * * *'   # 00:30 kickoff +3h
    - cron: '0 4 * * *'    # 01:00 kickoff +3h
    - cron: '30 4 * * *'   # 01:30 kickoff +3h
    - cron: '0 5 * * *'    # 02:00 kickoff +3h
    - cron: '0 6 * * *'    # 03:00 kickoff +3h
    - cron: '0 7 * * *'    # 04:00 kickoff +3h
    - cron: '0 18 * * *'   # 16:00 kickoff +2h
    - cron: '0 19 * * *'   # 16:00 kickoff +3h
    - cron: '0 20 * * *'   # 17:00 kickoff +3h
    - cron: '0 21 * * *'   # 18:00 kickoff +3h
    - cron: '0 22 * * *'   # 19:00 kickoff +3h
    - cron: '30 22 * * *'  # 20:30 kickoff +2h
    - cron: '0 23 * * *'   # 20:00 kickoff +3h
    - cron: '30 23 * * *'  # 20:30 kickoff +3h
    - cron: '0 0 * * *'    # 21:00 kickoff +3h
    - cron: '0 1 * * *'    # 22:00 kickoff +3h
    - cron: '30 1 * * *'   # 23:30 kickoff +2h

  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch and score results
        run: node fetch-results.js
        working-directory: scripts
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
